# Configuración nginx para Ubuntu — Sistema Rendición de Viáticos
# Archivo de referencia (setup_https_ubuntu.sh lo instala automáticamente)
# Ruta destino: /etc/nginx/sites-available/viaticos

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name rendiciones.tuempresa.com;   # <-- cambia a tu dominio

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rendiciones.tuempresa.com;   # <-- cambia a tu dominio

    ssl_certificate     /etc/letsencrypt/live/rendiciones.tuempresa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rendiciones.tuempresa.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    location /static/ {
        alias /opt/viaticos/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering    off;
    }
}
