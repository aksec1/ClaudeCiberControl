# Nginx reverse proxy para Sistema de Rendicion de Viaticos
# Windows: descarga nginx desde https://nginx.org/en/download.html
# Coloca este archivo en la carpeta conf/ de nginx

worker_processes  2;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # Limite de subida de archivos (debe coincidir con MAX_CONTENT_LENGTH)
    client_max_body_size 20M;

    # Redirigir HTTP → HTTPS
    server {
        listen       80;
        server_name  _;
        return 301 https://$host$request_uri;
    }

    # HTTPS principal
    server {
        listen       443 ssl;
        server_name  rendiciones.tuempresa.com;   # <-- cambia a tu dominio

        # Certificados Let's Encrypt (win-acme los ubica aqui por defecto)
        ssl_certificate      C:/ProgramData/win-acme/acme-v02.api.letsencrypt.org/rendiciones.tuempresa.com/chain.pem;
        ssl_certificate_key  C:/ProgramData/win-acme/acme-v02.api.letsencrypt.org/rendiciones.tuempresa.com/key.pem;

        ssl_protocols         TLSv1.2 TLSv1.3;
        ssl_ciphers           HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache     shared:SSL:10m;
        ssl_session_timeout   10m;

        # Cabeceras de seguridad
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Archivos estáticos directamente desde nginx (más eficiente)
        location /static/ {
            alias C:/viaticos/app/static/;    # <-- ajusta a tu ruta real
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Proxy a la app Flask/Waitress
        location / {
            proxy_pass         http://127.0.0.1:5000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Verificacion Let's Encrypt (ACME HTTP-01 challenge)
        location /.well-known/acme-challenge/ {
            root C:/nginx/html;
        }
    }
}
